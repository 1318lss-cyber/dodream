<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>두드림모터스 이성신 | 모바일 명함</title>
<meta property="og:title" content="두드림모터스 이성신 대표">
<meta property="og:description" content="믿을 수 있는 중고차, 꿈을 두드리는 첫걸음">
<style>
  :root{
    --navy:#0D1524;
    --navy-2:#141F33;
    --charcoal:#1C2638;
    --line:#2A3750;
    --red:#E5372E;
    --red-deep:#B7231C;
    --ink:#F4F6FA;
    --sub:#9AA7BD;
    --gold:#C9A45C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
    background:#080D17;
    color:var(--ink);
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:430px;min-height:100dvh;
    background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 55%,#0A1120 100%);
    display:flex;flex-direction:column;
    padding:0 22px calc(24px + env(safe-area-inset-bottom));
    position:relative;overflow:hidden;
  }
  /* 배경 라인 텍스처 */
  .card::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(229,55,46,.10), transparent 60%),
      repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.025) 79px 80px);
    pointer-events:none;
  }

  /* ── 헤더 / 노크 모티프 ── */
  .hero{position:relative;text-align:center;padding:58px 0 30px;}
  .knock{
    width:74px;height:74px;margin:0 auto 20px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .knock .door{
    width:74px;height:74px;border-radius:20px;
    background:linear-gradient(150deg,var(--red) 0%,var(--red-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:30px;color:#fff;letter-spacing:-1px;
    box-shadow:0 10px 30px rgba(229,55,46,.35);
    position:relative;z-index:2;
  }
  .knock .ring{
    position:absolute;inset:0;border-radius:20px;
    border:2px solid rgba(229,55,46,.55);
    animation:knock 2.8s ease-out infinite;
    z-index:1;
  }
  .knock .ring.r2{animation-delay:.35s;}
  @keyframes knock{
    0%,55%{transform:scale(1);opacity:0;}
    60%{transform:scale(1);opacity:.9;}
    100%{transform:scale(1.55);opacity:0;}
  }
  @media (prefers-reduced-motion:reduce){.knock .ring{animation:none;opacity:0;}}

  .brand-en{
    font-size:12px;font-weight:700;letter-spacing:.42em;color:var(--gold);
    text-transform:uppercase;margin-bottom:10px;text-indent:.42em;
  }
  .name{font-size:34px;font-weight:900;letter-spacing:-.5px;line-height:1.15;}
  .name small{display:block;font-size:15px;font-weight:600;color:var(--sub);letter-spacing:.14em;margin-top:8px;}
  .slogan{
    margin:22px auto 0;max-width:300px;
    font-size:14.5px;line-height:1.65;color:#C6D0E2;font-weight:500;
    padding-top:18px;position:relative;
  }
  .slogan::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:34px;height:2px;background:var(--red);
  }

  /* ── 주요 액션 ── */
  .primary-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:30px;position:relative;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:17px 10px;border-radius:14px;text-decoration:none;
    font-size:15.5px;font-weight:700;letter-spacing:-.2px;
    transition:transform .12s ease,filter .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97);filter:brightness(1.12);}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .btn-call{
    grid-column:1 / -1;
    background:linear-gradient(150deg,var(--red) 0%,var(--red-deep) 100%);
    color:#fff;font-size:17px;padding:19px 10px;
    box-shadow:0 8px 24px rgba(229,55,46,.3);
  }
  .btn-dark{background:var(--charcoal);color:var(--ink);border:1px solid var(--line);}
  .btn svg{width:19px;height:19px;flex:none;}

  /* ── 링크 목록 ── */
  .links{margin-top:26px;position:relative;}
  .links-label{
    font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--sub);
    text-transform:uppercase;margin-bottom:12px;text-indent:2px;
  }
  .link-row{
    display:flex;align-items:center;gap:14px;
    padding:15px 16px;border-radius:14px;text-decoration:none;
    background:rgba(255,255,255,.03);border:1px solid var(--line);
    margin-bottom:9px;color:var(--ink);
    transition:transform .12s ease,background .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .link-row:active{transform:scale(.985);background:rgba(255,255,255,.06);}
  .link-row:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .link-icon{
    width:38px;height:38px;border-radius:11px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:900;
  }
  .ic-blog{background:#03C75A22;color:#2BD97C;}
  .ic-insta{background:#E1306C22;color:#F06292;}
  .ic-map{background:#3B82F622;color:#7FB0F8;}
  .link-txt{flex:1;min-width:0;}
  .link-txt strong{display:block;font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .link-txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:3px;}
  .chev{color:var(--sub);flex:none;font-size:18px;}

  /* ── 하단 ── */
  .save-wrap{margin-top:auto;padding-top:26px;position:relative;}
  .btn-save{
    width:100%;background:transparent;border:1.5px solid var(--gold);
    color:var(--gold);border-radius:14px;padding:16px;
    font-size:15.5px;font-weight:800;letter-spacing:-.2px;
    font-family:inherit;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .12s ease,background .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-save:active{transform:scale(.97);background:rgba(201,164,92,.1);}
  .btn-save:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}
  .footer{
    text-align:center;margin-top:18px;
    font-size:11.5px;color:#5E6C84;line-height:1.7;letter-spacing:.02em;
  }
  .footer b{color:#8B99B0;font-weight:700;}
  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);
    background:var(--gold);color:#1A1408;font-weight:800;font-size:14px;
    padding:12px 22px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;white-space:nowrap;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:10;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<main class="card">

  <header class="hero">
    <div class="knock" aria-hidden="true">
      <span class="ring"></span>
      <span class="ring r2"></span>
      <div class="door">D</div>
    </div>
    <p class="brand-en">Dodream Motors</p>
    <h1 class="name">이성신
      <small>두드림모터스 대표딜러</small>
    </h1>
    <p class="slogan">믿을 수 있는 중고차,<br>꿈을 두드리는 첫걸음</p>
  </header>


  <nav class="primary-actions" aria-label="연락하기">
    <a class="btn btn-call" href="tel:010-4943-9727">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      전화 상담하기
    </a>
    <a class="btn btn-dark" href="sms:010-4943-9727">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      문자 문의
    </a>

    <a class="btn btn-dark" href="https://pf.kakao.com/_xmazfj" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.54 2 10.9c0 2.8 1.86 5.26 4.66 6.65-.2.75-.74 2.72-.85 3.14-.13.52.19.51.4.37.17-.11 2.65-1.8 3.72-2.53.66.1 1.35.15 2.07.15 5.52 0 10-3.54 10-7.78S17.52 3 12 3z"/></svg>
      카카오톡
    </a>
  </nav>

  <section class="links">
    <p class="links-label">Channels</p>

    <a class="link-row" href="https://blog.naver.com/019601lss" target="_blank" rel="noopener">
      <span class="link-icon ic-blog" aria-hidden="true">N</span>
      <span class="link-txt">
        <strong>네이버 블로그</strong>
        <span>입고 차량 · 투명한 차량 정보 공개</span>
      </span>
      <span class="chev" aria-hidden="true">›</span>
    </a>


    <a class="link-row" href="https://www.instagram.com/dajungcar9727" target="_blank" rel="noopener">
      <span class="link-icon ic-insta" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
      </span>
      <span class="link-txt">
        <strong>인스타그램</strong>
        <span>차량 릴스 · CARSTAGE 스튜디오 컷</span>
      </span>
      <span class="chev" aria-hidden="true">›</span>
    </a>

    <!-- ★ 지도 링크: 네이버지도에서 매장 검색 후 공유 링크로 교체 권장 -->
    <a class="link-row" href="https://map.naver.com/p/search/두드림모터스%20광주" target="_blank" rel="noopener">
      <span class="link-icon ic-map" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </span>
      <span class="link-txt">
        <strong>오시는 길</strong>
        <span>광주 · 호남 전 지역 무료 탁송</span>
      </span>
      <span class="chev" aria-hidden="true">›</span>
    </a>
  </section>

  <div class="save-wrap">
    <button class="btn-save" id="saveBtn" type="button">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      연락처 저장하기
    </button>
    <p class="footer">
      <b>두드림모터스</b> · 광주 · 전남 · 전북 · 전국 거래<br>
      정직한 차량 정보 공개 원칙
    </p>
  </div>

  <div class="toast" id="toast">연락처 파일이 저장되었습니다</div>
</main>

<script>
// 연락처 저장용 vCard
const VCARD = `BEGIN:VCARD
VERSION:3.0
N:이;성신;;;
FN:이성신
ORG:두드림모터스 (DODREAM MOTORS)
TITLE:대표딜러
TEL;TYPE=CELL:010-4943-9727
URL:https://blog.naver.com/019601lss
ADR;TYPE=WORK:;;서구 매월1로 62번길 12 비동 112호;광주광역시;;;대한민국
NOTE:믿을 수 있는 중고차, 꿈을 두드리는 첫걸음 - 호남 전 지역 무료 탁송, 전국 거래
END:VCARD`;

document.getElementById('saveBtn').addEventListener('click', () => {
  const blob = new Blob([VCARD], {type:'text/vcard;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DODREAM_LeeSungShin.vcf';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
});
</script>
</body>
</html>
