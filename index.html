<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>두드림모터스 이성신 | 모바일 명함</title>
<meta property="og:title" content="두드림모터스 이성신 대표">
<meta property="og:description" content="믿을 수 있는 중고차, 꿈을 두드리는 첫걸음">
<style>
  :root{
    --navy:#0D1524;
    --navy-2:#141F33;
    --charcoal:#1C2638;
    --line:#2A3750;
    --red:#E5372E;
    --red-deep:#B7231C;
    --ink:#F4F6FA;
    --sub:#9AA7BD;
    --gold:#C9A45C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
    background:#080D17;
    color:var(--ink);
    display:flex;justify-content:center;
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;max-width:430px;min-height:100dvh;
    background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 55%,#0A1120 100%);
    display:flex;flex-direction:column;
    padding:0 20px calc(18px + env(safe-area-inset-bottom));
    position:relative;overflow:hidden;
  }
  /* 배경 라인 텍스처 */
  .card::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(229,55,46,.10), transparent 60%),
      repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,.025) 79px 80px);
    pointer-events:none;
  }

  /* ── 헤더 / 노크 모티프 ── */
  .hero{position:relative;text-align:center;padding:34px 0 20px;}
  .knock{
    width:96px;height:96px;margin:0 auto 14px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .knock .photo{
    width:96px;height:96px;border-radius:50%;
    object-fit:cover;display:block;
    border:3px solid var(--red);
    box-shadow:0 10px 30px rgba(229,55,46,.3);
    position:relative;z-index:2;background:var(--charcoal);
  }
  .knock .ring{
    position:absolute;inset:0;border-radius:50%;
    border:2px solid rgba(229,55,46,.55);
    animation:knock 2.8s ease-out infinite;
    z-index:1;
  }
  .knock .ring.r2{animation-delay:.35s;}
  @keyframes knock{
    0%,55%{transform:scale(1);opacity:0;}
    60%{transform:scale(1);opacity:.9;}
    100%{transform:scale(1.55);opacity:0;}
  }
  @media (prefers-reduced-motion:reduce){.knock .ring{animation:none;opacity:0;}}

  .brand-en{
    font-size:11px;font-weight:700;letter-spacing:.42em;color:var(--gold);
    text-transform:uppercase;margin-bottom:8px;text-indent:.42em;
  }
  .name{font-size:29px;font-weight:900;letter-spacing:-.5px;line-height:1.15;}
  .name small{display:block;font-size:14px;font-weight:600;color:var(--sub);letter-spacing:.14em;margin-top:6px;}
  .slogan{
    margin:14px auto 0;max-width:300px;
    font-size:13.5px;line-height:1.6;color:#C6D0E2;font-weight:500;
    padding-top:12px;position:relative;
  }
  .slogan::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:34px;height:2px;background:var(--red);
  }

  /* ── 주요 액션 ── */
  .primary-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:20px;position:relative;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:14px 10px;border-radius:14px;text-decoration:none;
    font-size:15px;font-weight:700;letter-spacing:-.2px;
    transition:transform .12s ease,filter .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97);filter:brightness(1.12);}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .btn-call{
    grid-column:1 / -1;
    background:linear-gradient(150deg,var(--red) 0%,var(--red-deep) 100%);
    color:#fff;font-size:16.5px;padding:16px 10px;
    box-shadow:0 8px 24px rgba(229,55,46,.3);
  }
  .btn-dark{background:var(--charcoal);color:var(--ink);border:1px solid var(--line);}
  .btn svg{width:19px;height:19px;flex:none;}

  /* ── 링크 목록 ── */
  .links{margin-top:18px;position:relative;}
  .links-label{
    font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--sub);
    text-transform:uppercase;margin-bottom:9px;text-indent:2px;
  }
  .link-row{
    display:flex;align-items:center;gap:13px;
    padding:12px 14px;border-radius:14px;text-decoration:none;
    background:rgba(255,255,255,.03);border:1px solid var(--line);
    margin-bottom:8px;color:var(--ink);
    transition:transform .12s ease,background .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .link-row:active{transform:scale(.985);background:rgba(255,255,255,.06);}
  .link-row:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .link-icon{
    width:38px;height:38px;border-radius:11px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:900;
  }
  .ic-blog{background:#03C75A22;color:#2BD97C;}
  .ic-insta{background:#E1306C22;color:#F06292;}
  .ic-map{background:#3B82F622;color:#7FB0F8;}
  .link-txt{flex:1;min-width:0;}
  .link-txt strong{display:block;font-size:15px;font-weight:700;letter-spacing:-.2px;}
  .link-txt span{display:block;font-size:12.5px;color:var(--sub);margin-top:3px;}
  .chev{color:var(--sub);flex:none;font-size:18px;}

  /* ── 하단 ── */
  .save-wrap{margin-top:auto;padding-top:16px;position:relative;}
  .btn-save{
    width:100%;background:transparent;border:1.5px solid var(--gold);
    color:var(--gold);border-radius:14px;padding:13px;
    font-size:15px;font-weight:800;letter-spacing:-.2px;
    font-family:inherit;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .12s ease,background .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-save:active{transform:scale(.97);background:rgba(201,164,92,.1);}
  .btn-save:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}
  .footer{
    text-align:center;margin-top:12px;
    font-size:11px;color:#5E6C84;line-height:1.6;letter-spacing:.02em;
  }
  .footer b{color:#8B99B0;font-weight:700;}
  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(10px);
    background:var(--gold);color:#1A1408;font-weight:800;font-size:14px;
    padding:12px 22px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;white-space:nowrap;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:10;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
